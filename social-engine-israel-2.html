<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Social Engine Israel 🔥</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a0f;--s1:#111118;--s2:#1a1a25;--br:#2a2a3a;--ac:#ff3c5a;--ac2:#ff8c00;--ac3:#7b2fff;--tx:#f0f0f8;--tm:#8888aa}
body{font-family:'Heebo',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;direction:rtl}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(123,47,255,.07) 0%,transparent 60%),radial-gradient(ellipse 50% 50% at 80% 80%,rgba(255,60,90,.05) 0%,transparent 60%);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:0 14px 80px}
.hdr{text-align:center;padding:30px 0 22px;border-bottom:1px solid var(--br);margin-bottom:20px}
.badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(135deg,var(--ac),var(--ac3));padding:5px 13px;border-radius:100px;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:11px}
h1{font-size:clamp(22px,5vw,38px);font-weight:900;line-height:1.1;background:linear-gradient(135deg,#fff 30%,var(--ac) 70%,var(--ac2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.sub{color:var(--tm);font-size:13px}
.card{background:var(--s1);border:1px solid var(--br);border-radius:16px;padding:20px;margin-bottom:16px}
.ctitle{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ac);margin-bottom:14px}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.fg:last-child{margin-bottom:0}
label{font-size:10px;font-weight:700;color:var(--tm);text-transform:uppercase;letter-spacing:1px}
input,select,textarea{background:var(--s2);border:1px solid var(--br);border-radius:10px;color:var(--tx);font-family:'Heebo',sans-serif;font-size:15px;padding:12px 14px;outline:none;width:100%;direction:rtl;transition:border-color .2s}
input[dir=ltr]{direction:ltr}
input:focus,select:focus,textarea:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(255,60,90,.1)}
select option{background:#1a1a25}
textarea{resize:vertical;min-height:65px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px}
@media(max-width:460px){.row2,.row3{grid-template-columns:1fr}}
.key-row{display:flex;gap:8px}
.key-row input{flex:1}
.key-btn{background:var(--s2);border:1px solid var(--br);border-radius:10px;color:var(--tm);font-family:'Heebo',sans-serif;font-size:13px;padding:12px 14px;cursor:pointer;white-space:nowrap;transition:all .15s}
.key-btn:hover{border-color:var(--ac);color:var(--tx)}
.key-ok{display:none;align-items:center;gap:6px;background:rgba(0,200,100,.08);border:1px solid rgba(0,200,100,.2);border-radius:8px;padding:8px 12px;font-size:12px;color:#00c864;margin-top:6px}
.key-ok.show{display:flex}
.key-hint{font-size:11px;color:var(--tm);margin-top:6px;line-height:1.6}
.key-hint a{color:#4285f4;text-decoration:none}
.steps{background:rgba(66,133,244,.08);border:1px solid rgba(66,133,244,.2);border-radius:10px;padding:12px 14px;margin-top:8px;font-size:12px;color:#7ab4ff;line-height:1.9}
.steps b{color:#a0c8ff}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--ac),#cc1a36);border:none;border-radius:12px;color:#fff;font-family:'Heebo',sans-serif;font-size:17px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;box-shadow:0 4px 20px rgba(255,60,90,.35);transition:transform .15s,box-shadow .15s;margin-top:4px}
.btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,60,90,.45)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.lbar{display:none;margin-top:13px;background:var(--s2);border-radius:100px;height:4px;overflow:hidden}
.lbar.on{display:block}
.lbar-i{height:100%;width:0;background:linear-gradient(90deg,var(--ac3),var(--ac),var(--ac2));border-radius:100px;animation:lb 20s linear forwards}
@keyframes lb{0%{width:0}50%{width:68%}88%{width:90%}100%{width:95%}}
.ltxt{display:none;text-align:center;margin-top:9px;color:var(--tm);font-size:13px;animation:pu 1.5s ease-in-out infinite}
.ltxt.on{display:block}
@keyframes pu{0%,100%{opacity:.4}50%{opacity:1}}
.errmsg{background:rgba(255,60,90,.08);border:1px solid rgba(255,60,90,.25);border-radius:12px;padding:13px 16px;color:#ff8fa0;font-size:13px;text-align:center;margin-top:12px;display:none;word-break:break-word}
.errmsg.show{display:block}
.phase{background:var(--s1);border:1px solid var(--br);border-radius:14px;overflow:hidden;margin-bottom:12px;animation:si .4s ease both}
@keyframes si{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.phase:nth-child(1){animation-delay:.05s}.phase:nth-child(2){animation-delay:.11s}.phase:nth-child(3){animation-delay:.17s}.phase:nth-child(4){animation-delay:.23s}.phase:nth-child(5){animation-delay:.29s}
.ph{padding:14px 17px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none;transition:background .15s}
.ph:hover{background:rgba(255,255,255,.02)}
.ph.open{border-bottom:1px solid var(--br)}
.ptitle{font-size:14px;font-weight:700;flex:1}
.psub{font-size:11px;color:var(--tm);margin-top:2px}
.chev{color:var(--tm);font-size:12px;transition:transform .2s}
.ph.open .chev{transform:rotate(180deg)}
.pb{max-height:0;overflow:hidden;transition:max-height .4s ease}
.pb.open{max-height:6000px}
.pi{padding:18px}
.srow{display:flex;align-items:center;gap:14px;padding:12px 15px;background:var(--s2);border-radius:12px;margin-bottom:14px}
.snum{font-size:36px;font-weight:900;line-height:1}
.sec{margin-bottom:16px}.sec:last-child{margin-bottom:0}
.slbl{font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--ac);margin-bottom:7px;display:flex;align-items:center;gap:5px}
.slbl::before{content:'';width:3px;height:12px;background:var(--ac);border-radius:2px;display:inline-block}
.prose{color:var(--tm);font-size:14px;line-height:1.8}
.hooks{display:flex;flex-direction:column;gap:8px}
.hook{background:var(--s2);border:1px solid var(--br);border-right:3px solid var(--ac);border-radius:10px;padding:11px 13px;font-size:14px;font-weight:600;line-height:1.5}
.hnum{font-size:9px;color:var(--ac);font-weight:700;margin-bottom:3px}
.scrd{background:var(--s2);border:1px solid var(--br);border-radius:12px;overflow:hidden}
.sp{padding:12px 15px;border-bottom:1px solid var(--br)}.sp:last-child{border-bottom:none}
.spb{display:inline-block;font-size:9px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-bottom:7px}
.pbox{background:#0d0d18;border:1px solid var(--br);border-radius:10px;padding:13px;margin-bottom:9px;position:relative}
.pbox-lbl{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--ac3);margin-bottom:7px}
.pbox-txt{font-size:12px;color:#c8c8e8;line-height:1.7;font-family:monospace;white-space:pre-wrap;word-break:break-word;padding-left:52px}
.cpbtn{position:absolute;top:10px;left:10px;background:var(--s2);border:1px solid var(--br);border-radius:6px;color:var(--tm);font-size:11px;padding:3px 9px;cursor:pointer;font-family:'Heebo',sans-serif}
.tags{display:flex;flex-wrap:wrap;gap:6px}
.tg{padding:4px 10px;border-radius:100px;font-size:12px;font-weight:600;background:rgba(123,47,255,.15);color:#b07fff;border:1px solid rgba(123,47,255,.25)}
.tl{padding:4px 10px;border-radius:100px;font-size:12px;font-weight:600;background:rgba(255,60,90,.1);color:#ff8fa0;border:1px solid rgba(255,60,90,.2)}
.tgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tc{background:var(--s2);border:1px solid var(--br);border-radius:10px;padding:11px;text-align:center}
.td{font-size:13px;font-weight:700;margin-bottom:2px}
.tt{font-size:20px;font-weight:900;color:var(--ac2)}
.tn{font-size:10px;color:var(--tm);margin-top:2px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hdr">
    <div class="badge">🔥 חינמי לגמרי</div>
    <h1>Social Engine Israel</h1>
    <p class="sub">אדריכל הוויראליות · מפרופיל קטן למיליוני עוקבים</p>
  </div>

  <div class="card">
    <div class="ctitle">🔑 מפתח Gemini (חינמי)</div>
    <div class="fg">
      <label>הדבק כאן את המפתח</label>
      <div class="key-row">
        <input type="password" id="apikey" placeholder="AIzaSy..." dir="ltr" oninput="onKey()">
        <button class="key-btn" onclick="toggleVis()">👁 הצג</button>
      </div>
      <div class="key-ok" id="keyok">✅ מפתח תקין — שמור במכשיר</div>
      <div class="steps">
        <b>קבלת מפתח חינמי (30 שניות):</b><br>
        1. כנס ל: <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com/app/apikey</a><br>
        2. לחץ <b>"Create API key"</b><br>
        3. העתק את המפתח והדבק למעלה
      </div>
    </div>
  </div>

  <div class="card">
    <div class="ctitle">🎯 סריקת פרופיל</div>
    <div class="row2" style="margin-bottom:10px">
      <div class="fg" style="margin-bottom:0"><label>שם משתמש</label><input id="un" placeholder="@yourhandle" dir="ltr"></div>
      <div class="fg" style="margin-bottom:0"><label>פלטפורמה</label>
        <select id="pl"><option>Instagram</option><option>TikTok</option><option>YouTube Shorts</option><option>Facebook</option><option>LinkedIn</option><option>Twitter/X</option></select>
      </div>
    </div>
    <div class="row3" style="margin-bottom:10px">
      <div class="fg" style="margin-bottom:0"><label>עוקבים</label><input id="fo" placeholder="8,000"></div>
      <div class="fg" style="margin-bottom:0"><label>ממוצע לייקים</label><input id="li" placeholder="80"></div>
      <div class="fg" style="margin-bottom:0"><label>נישה</label><input id="ni" placeholder="מוזיקה..."></div>
    </div>
    <div class="fg">
      <label>תיאור (אופציונלי)</label>
      <textarea id="de" placeholder="סגנון, קהל, מה כבר ניסית..."></textarea>
    </div>
    <button class="btn" id="abtn" onclick="run()">
      <span id="bi">🚀</span><span id="bt">הפעל ניתוח ויראלי</span>
    </button>
    <div class="lbar" id="lb"><div class="lbar-i" id="lbi"></div></div>
    <div class="ltxt" id="lt">🧠 מנתח...</div>
    <div class="errmsg" id="errdiv"></div>
  </div>

  <div id="res"></div>
</div>

<script>
const MSGS=["🧠 סורק DNA ויזואלי...","📊 מנתח מעורבות...","🎯 מזהה פערי צמיחה...","✍️ בונה אסטרטגיה...","🎬 כותב תסריט...","🎨 מייצר פרומפטים...","⚡ כמעט מוכן..."];
let mt=null;

window.onload=()=>{
  const k=localStorage.getItem('sei_gemini');
  if(k){document.getElementById('apikey').value=k;checkK(k);}
};

function onKey(){
  const v=document.getElementById('apikey').value.trim();
  if(v.length>10)localStorage.setItem('sei_gemini',v);
  checkK(v);
}

function checkK(v){
  document.getElementById('keyok').classList.toggle('show',v.startsWith('AIza')&&v.length>20);
}

function toggleVis(){
  const i=document.getElementById('apikey');
  i.type=i.type==='password'?'text':'password';
}

const PROMPT=`You are a viral content strategy expert for the Israeli social media market.
Return ONLY a valid JSON object. No markdown, no backticks, no text outside JSON.
Never use unescaped double quotes inside string values.

Return exactly this flat JSON:
{"score":7,"score_summary":"text","visual_dna":"text","top_posts_insight":"text","target_audience":"text","growth_gap":"text","concept":"text","hook1":"hebrew text","hook2":"hebrew text","hook3":"hebrew text","hook4":"hebrew text","hook5":"hebrew text","script_hook":"text","script_body":"text","script_cta":"text","loops":"text","vid_prompt":"english prompt","img_prompt":"english prompt","sound":"text","t1d":"ראשון","t1t":"20:00","t1n":"פריים טיים","t2d":"חמישי","t2t":"14:00","t2n":"שיא צריכה","t3d":"שישי","t3t":"10:30","t3n":"בוקר שישי","g1":"#tag1","g2":"#tag2","g3":"#tag3","g4":"#tag4","g5":"#tag5","l1":"#תגית1","l2":"#תגית2","l3":"#תגית3","l4":"#תגית4","l5":"#תגית5","cta":"text"}

Write all analysis, hooks, and script in Hebrew. Write video/image prompts in English.`;

async function run(){
  const key=document.getElementById('apikey').value.trim();
  const un=document.getElementById('un').value.trim();
  const err=document.getElementById('errdiv');

  if(!key.startsWith('AIza')||key.length<20){
    err.textContent='⚠️ נא להזין מפתח Gemini תקין (מתחיל עם AIza)';
    err.classList.add('show');return;
  }
  if(!un){alert('נא להזין שם משתמש');return;}

  err.classList.remove('show');
  const btn=document.getElementById('abtn');
  btn.disabled=true;
  document.getElementById('bi').textContent='⏳';
  document.getElementById('bt').textContent='מנתח...';
  document.getElementById('res').innerHTML='';

  const lbi=document.getElementById('lbi');
  lbi.style.animation='none';lbi.offsetHeight;lbi.style.animation='';
  document.getElementById('lb').classList.add('on');
  const lt=document.getElementById('lt');lt.classList.add('on');lt.textContent=MSGS[0];
  let mi=1;mt=setInterval(()=>{lt.textContent=MSGS[mi%MSGS.length];mi++;},2200);

  const fo=document.getElementById('fo').value||'לא ידוע';
  const li=document.getElementById('li').value||'לא ידוע';
  const ni=document.getElementById('ni').value||'לא צוין';
  const de=document.getElementById('de').value||'לא צוין';
  const pl=document.getElementById('pl').value;

  const userMsg=`${PROMPT}\n\nAnalyze this profile and return JSON only:\nUsername: ${un}\nPlatform: ${pl}\nFollowers: ${fo}\nAvg likes: ${li}\nNiche: ${ni}\nDescription: ${de}`;

  try{
    const resp=await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${key}`,
      {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          contents:[{parts:[{text:userMsg}]}],
          generationConfig:{temperature:0.7,maxOutputTokens:2000}
        })
      }
    );

    if(!resp.ok){const t=await resp.text();throw new Error('HTTP '+resp.status+' — '+t.slice(0,200));}
    const data=await resp.json();
    const raw=data?.candidates?.[0]?.content?.parts?.[0]?.text||'';
    if(!raw)throw new Error('תשובה ריקה מ-Gemini');

    const a=raw.indexOf('{'),z=raw.lastIndexOf('}');
    if(a<0||z<0)throw new Error('JSON לא תקין בתשובה');
    const r=JSON.parse(raw.slice(a,z+1));

    done();
    btn.disabled=false;
    document.getElementById('bi').textContent='🔄';
    document.getElementById('bt').textContent='נתח שוב';
    render(r,un,pl);

  }catch(ex){
    done();
    btn.disabled=false;
    document.getElementById('bi').textContent='🚀';
    document.getElementById('bt').textContent='הפעל ניתוח ויראלי';
    err.textContent='⚠️ '+ex.message;
    err.classList.add('show');
  }
}

function done(){
  clearInterval(mt);
  document.getElementById('lb').classList.remove('on');
  document.getElementById('lt').classList.remove('on');
}

function e(v){return(v||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function render(r,un,pl){
  const sc=Number(r.score)||5;
  const col=sc>=7?'#00c864':sc>=4?'#ff8c00':'#ff3c5a';
  const hooks=[r.hook1,r.hook2,r.hook3,r.hook4,r.hook5].filter(Boolean);
  const tg=[r.g1,r.g2,r.g3,r.g4,r.g5].filter(Boolean);
  const tl=[r.l1,r.l2,r.l3,r.l4,r.l5].filter(Boolean);
  const tim=[{d:r.t1d,t:r.t1t,n:r.t1n},{d:r.t2d,t:r.t2t,n:r.t2n},{d:r.t3d,t:r.t3t,n:r.t3n}];
  window._vp=r.vid_prompt||'';window._ip=r.img_prompt||'';

  document.getElementById('res').innerHTML=`
  <div class="phase">
    <div class="ph open" onclick="tp(this)"><div style="flex:1"><div class="ptitle">📊 דוח מצב נוכחי</div><div class="psub">${e(un)} · ${e(pl)}</div></div><span class="chev">▼</span></div>
    <div class="pb open"><div class="pi">
      <div class="srow">
        <div class="snum" style="color:${col}">${sc}<span style="font-size:15px;color:var(--tm)">/10</span></div>
        <div><div style="font-size:15px;font-weight:700;margin-bottom:3px">${e(r.score_summary)}</div><div style="font-size:11px;color:var(--tm)">ציון ויראליות</div></div>
      </div>
      <div class="sec"><div class="slbl">DNA ויזואלי</div><div class="prose">${e(r.visual_dna)}</div></div>
      <div class="sec"><div class="slbl">מה עובד</div><div class="prose">${e(r.top_posts_insight)}</div></div>
      <div class="sec"><div class="slbl">קהל יעד</div><div class="prose">${e(r.target_audience)}</div></div>
      <div class="sec"><div class="slbl">⚡ החוליה החסרה</div><div class="prose"><strong style="color:var(--tx)">${e(r.growth_gap)}</strong></div></div>
    </div></div>
  </div>
  <div class="phase">
    <div class="ph open" onclick="tp(this)"><div style="flex:1"><div class="ptitle">🧠 אסטרטגיית המיליונים</div><div class="psub">קונספט · הוקס · לופים</div></div><span class="chev">▼</span></div>
    <div class="pb open"><div class="pi">
      <div class="sec"><div class="slbl">הקונספט המנצח</div><div class="prose"><strong style="color:var(--tx)">${e(r.concept)}</strong></div></div>
      <div class="sec"><div class="slbl">5 הוקס עוצרי גלילה</div>
        <div class="hooks">${hooks.map((h,i)=>`<div class="hook"><div class="hnum">הוק #${i+1}</div>${e(h)}</div>`).join('')}</div>
      </div>
      <div class="sec"><div class="slbl">לופ ממכר</div><div class="prose">${e(r.loops)}</div></div>
    </div></div>
  </div>
  <div class="phase">
    <div class="ph open" onclick="tp(this)"><div style="flex:1"><div class="ptitle">🎬 תסריט ויראלי</div><div class="psub">מוכן לצילום</div></div><span class="chev">▼</span></div>
    <div class="pb open"><div class="pi">
      <div class="scrd">
        <div class="sp"><div class="spb" style="background:rgba(255,60,90,.15);color:#ff3c5a">🎣 Hook</div><div class="prose">${e(r.script_hook)}</div></div>
        <div class="sp"><div class="spb" style="background:rgba(123,47,255,.15);color:#a57fff">📖 Body</div><div class="prose">${e(r.script_body)}</div></div>
        <div class="sp"><div class="spb" style="background:rgba(255,140,0,.15);color:#ff8c00">🎯 CTA</div><div class="prose"><strong style="color:var(--tx)">${e(r.script_cta)}</strong></div></div>
      </div>
    </div></div>
  </div>
  <div class="phase">
    <div class="ph" onclick="tp(this)"><div style="flex:1"><div class="ptitle">🎨 פקודות AI למדיה</div><div class="psub">Prompts להעתקה</div></div><span class="chev">▼</span></div>
    <div class="pb"><div class="pi">
      <div class="pbox"><div class="pbox-lbl">🎥 Video Prompt</div><button class="cpbtn" onclick="cp(this,'v')">העתק</button><div class="pbox-txt">${e(r.vid_prompt)}</div></div>
      <div class="pbox"><div class="pbox-lbl">🖼️ Image Prompt</div><button class="cpbtn" onclick="cp(this,'i')">העתק</button><div class="pbox-txt">${e(r.img_prompt)}</div></div>
      <div class="sec"><div class="slbl">🎵 סאונד ו-BPM</div><div class="prose">${e(r.sound)}</div></div>
    </div></div>
  </div>
  <div class="phase">
    <div class="ph" onclick="tp(this)"><div style="flex:1"><div class="ptitle">📡 הפצה ישראלית</div><div class="psub">תזמון · האשטאגים · CTA</div></div><span class="chev">▼</span></div>
    <div class="pb"><div class="pi">
      <div class="sec"><div class="slbl">⏰ תזמון</div>
        <div class="tgrid">${tim.map(t=>`<div class="tc"><div class="td">${e(t.d)}</div><div class="tt">${e(t.t)}</div><div class="tn">${e(t.n)}</div></div>`).join('')}</div>
      </div>
      <div class="sec"><div class="slbl">🌍 גלובליים</div><div class="tags">${tg.map(t=>`<span class="tg">${e(t)}</span>`).join('')}</div></div>
      <div class="sec"><div class="slbl">🇮🇱 ישראליים</div><div class="tags">${tl.map(t=>`<span class="tl">${e(t)}</span>`).join('')}</div></div>
      <div class="sec"><div class="slbl">📣 CTA</div><div class="prose"><strong style="color:var(--tx)">${e(r.cta)}</strong></div></div>
    </div></div>
  </div>`;
}

function tp(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function cp(btn,t){navigator.clipboard.writeText(t==='v'?window._vp:window._ip).then(()=>{btn.textContent='✓';setTimeout(()=>btn.textContent='העתק',2000);});}
</script>
</body>
</html>
